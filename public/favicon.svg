<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#0F172A" />
  
  <!-- Outer glowing ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.8" />
  
