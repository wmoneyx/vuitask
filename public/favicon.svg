  <path d="M 20 30 L 50 75 L 80 30" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- The S cutout mask (middle layer) to create 3D overlap effect -->
