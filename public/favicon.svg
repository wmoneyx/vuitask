  <path d="M 50 12 V 22 M 50 86 V 96" fill="none" stroke="#0F172A" stroke-width="16" stroke-linecap="round" />
  
  <!-- The S shape forming $ (top layer) -->
  <path d="M 65 35 C 65 25 57 20 50 20 C 43 20 35 25 35 35 C 35 45 42 48 50 53 C 58 58 65 62 65 72 C 65 82 58 88 50 88 C 42 88 35 83 35 73" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
